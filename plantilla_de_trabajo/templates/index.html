<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pathraguay - Swiping Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-dark text-light">

<div class="contenedor-juego">
    <header class="hud p-3 mb-4 rounded shadow-sm">
        <div class="stat">❤ <span id="ui-salud">--</span></div>
        <div class="stat">🗣 <span id="ui-social">--</span></div>
        <div class="stat">🧠 <span id="ui-intelecto">--</span></div>
        <div class="stat">💼 <span id="ui-laboral">--</span></div>
        <div class="stat dinero fw-bold">Gs: <span id="ui-dinero">--</span></div>
    </header>

    <main class="zona-cartas">
        <div id="tarjeta-activa" class="tarjeta-swipe">
            <div id="ind-izq" class="indicador ind-izq">RECHAZAR</div>
            <div id="ind-der" class="indicador ind-der">ACEPTAR</div>
            
            <div class="contenido-carta">
                <h4 id="ui-texto-carta">Conectando al Motor...</h4>
            </div>
        </div>
    </main>

    <div class="controles-auxiliares mt-4 d-flex justify-content-between">
        <button id="btn-izq" class="btn btn-outline-danger w-45" onclick="enviarDecision('izq')">Opción Izquierda</button>
        <button id="btn-der" class="btn btn-outline-success w-45" onclick="enviarDecision('der')">Opción Derecha</button>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
